<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos App</title>
    <link rel="stylesheet" href="./lib/style.css">
</head>
<body>
    <div id="app">
        <div class="page-title">todos</div>
        <div class="todos-form">
            <form id="todo-form">
                <input id="todo-input" type="text" placeholder="What needs to be done?" />
                <button type="submit">Add</button>
            </form>
        </div>
        <div class="todos-list">
            <ul id="todos-list"></ul>
        </div>
        <div class="todos-stats">
            <div class="todos-left"></div>
            <div class="todos-filters">
                <button id="filter-all" class="active">All</button>
                <button id="filter-active">Active</button>
                <button id="filter-completed">Completed</button>
            </div>
            <div class="todos-clear">
                <button id="clear-completed" disabled>Clear Completed</button>
            </div>
        </div>
    </div>
    <script src="lib/app.js"></script>
</body>
</html>
